components:
  callbacks:
    PaymentWebhook:
      object Object:
        description: payment webhook object.
        post:
          requestBody:
            content:
              application/json:
                schema:
                  properties:
                    data:
                      description: webhook object.
                      properties:
                        order:
                          description: order entity in webhook.
                          properties:
                            order_id:
                              type: string
                            order_amount:
                              format: double
                              type: number
                            order_currency:
                              type: string
                            order_tags:
                              additionalProperties:
                                maxLength: 255
                                minLength: 1
                                type: string
                              description: "Custom Tags in the form of {\"key\":\"\
                                value\"} which can be passed for an order. A maximum\
                                \ of 10 tags can be added."
                              maxProperties: 15
                              type: object
                          type: object
                        payment:
                          allOf:
                          - $ref: "#/components/schemas/PaymentEntity"
                        payment_gateway_details:
                          $ref: "#/components/schemas/PaymentGatewayDetails"
                        payment_surcharge:
                          properties:
                            payment_surcharge_service_charge:
                              format: float64
                              type: number
                            payment_surcharge_service_tax:
                              format: float64
                              type: number
                          type: object
                        payment_offers:
                          items:
                            $ref: "#/components/schemas/OfferEntity"
                          type: array
                        customer_details:
                          description: customer details object in webhook.
                          properties:
                            customer_name:
                              example: Yogesh
                              type: string
                            customer_id:
                              example: "12121212"
                              type: string
                            customer_email:
                              example: yogesh.miglani@gmail.com
                              type: string
                            customer_phone:
                              example: "9666699999"
                              type: string
                          type: object
                      type: object
                    event_time:
                      example: 2021-10-07T19:42:44+05:30
                      type: string
                    type:
                      example: PAYMENT_SUCCESS_WEBHOOK
                      type: string
                  type: object
            required: true
          responses:
            "200":
              description: OK
            "4XX":
              description: NOT OK. Webhook will be retried.
            "5XX":
              description: NOT OK. Webhook will be retried.
          security: []
          summary: Received payment success webhook
