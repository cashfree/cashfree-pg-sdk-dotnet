        upi_id: john@okxdfcbak
        upi_expiry_minutes: 10
      properties:
        channel:
          description: "Specify the channel through which the payment must be processed.\
            \ Can be one of [\"link\", \"collect\", \"qrcode\", \"podQrCode\"]."
          enum:
          - link
          - collect
          - qrcode
          - podQrCode
          type: string
        upi_id:
          description: "Customer UPI VPA to process payment. \n### Important\nThis\
            \ is a required parameter for channel = `collect`.\n"
          type: string
        upi_redirect_url:
          description: |
            use this if you want cashfree to show a loader. Sample response below. It is only supported for collect
            `action:collect` will be returned with `data.url` having the link for redirection.
          type: boolean
        upi_expiry_minutes:
          description: "The UPI request will be valid for this expiry minutes. This\
            \ parameter is only applicable for a UPI collect payment. The default\
            \ value is 5 minutes. You should keep the minimum as 5 minutes, and maximum\
            \ as 15 minutes."
          type: number
        authorize_only:
          description: For one time mandate on UPI. Set this as authorize_only = true.
            Please note that you can only use the "collect" channel if you are sending
            a one time mandate request.
          type: boolean
