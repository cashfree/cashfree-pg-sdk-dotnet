    Card:
      description: "The card payment object can be used to make payments using a plain\
        \ card, a card saved with Cashfree, an externally saved card, or an external\
        \ Alt ID for guest checkout transactions. Refer to the examples in the Sample\
        \ Request section for different payloads, and refer [Token Vault](https://www.cashfree.com/docs/payments/features/token-vault#token-vault)\
        \ for more details on tokenisation."
      example:
        channel: link
        card_number: "4111111111111111"
        card_holder_name: Tushar Gupta
        card_expiry_mm: "06"
        card_expiry_yy: "22"
        card_cvv: "900"
        address_line_one: Address line 1
        address_line_two: Address line 2
        city: Minnehaha
        zip_code: "57109"
        country: United States
        country_code: US
        state: South Dakota
        state_code: SD
      properties:
        channel:
          description: "The channel for card payments can be \"link\" or \"post\"\
            . Use \"post\" to request [Native OTP](https://www.cashfree.com/docs/payments/features/native-otp)\
            \ authentication, where the merchant must render the Native OTP UI to\
            \ collect the OTP. Otherwise, use link for the redirection flow."
          enum:
          - link
          - post
          type: string
        card_number:
          description: "Customer’s card number for plain card transactions, or token\
            \ number for external token transactions, or Alt ID number for external\
            \ Alt ID transactions."
          type: string
        card_holder_name:
          description: Name on the customer’s card. Optional for external token or
            external Alt ID transactions.
          type: string
        card_expiry_mm:
          description: "Card expiry month for plain card transactions, or token expiry\
            \ month for external token transactions, or Alt ID expiry month for external\
            \ Alt ID transactions."
          type: string
        card_expiry_yy:
          description: "Card expiry year for plain card transactions, or token expiry\
            \ year for external token transactions and Alt ID expiry year for external\
            \ Alt ID transactions."
          type: string
        card_cvv:
          description: CVV mentioned on the card. Mandatory for plain card and external
            Alt ID transactions; optional for saved card transactions.
          type: string
        instrument_id:
          description: "Instrument ID of the saved card, as received in response from\
            \ [Fetch All Saved Card Instrument API](https://www.cashfree.com/docs/api-reference/payments/latest/token-vault/get-all).\
            \ Required only when making payments using cards saved with Cashfree."
          type: string
        cryptogram:
          description: Cryptogram received from the card network. Required only for
            external token or external Alt ID transactions; provided by the merchant’s
            token requestor.
          type: string
        token_requestor_id:
          description: Token Requestor ID (TRID) issued by the respective card network.
            Required only for external token transactions; provided by the merchant’s
            token requestor.
          type: string
        token_reference_id:
          description: "Token Reference ID, required only for external Alt ID transactions\
            \ for Diners; provided by the merchant’s token requestor."
          type: string
        token_type:
          description: Token type enum. Mandatory only for external Alt ID transactions.
          enum:
          - NETWORK_GC_TOKEN
          type: string
        card_display:
          description: "Last 4 digits of original card number, required only for external\
            \ token or external Alt ID transactions, used for bookkeeping purposes."
          type: string
        card_bank_name:
          description: "One of [\"Kotak\", \"ICICI\", \"RBL\", \"BOB\", \"Standard\
            \ Chartered\"]. Card bank name, required for EMI payments. This is the\
            \ bank user has selected for EMI."
          enum:
          - Kotak
          - ICICI
          - RBL
          - BOB
          - Standard Chartered
          type: string
        address_line_one:
          description: First line of the address.
          type: string
        address_line_two:
          description: Second line of the address.
          type: string
        city:
          description: City Name.
          type: string
        zip_code:
          description: Pin Code/Zip Code.
          type: string
        country:
          description: Country Name.
          type: string
        country_code:
          description: Country Code. Should be in ISO 2 format (ie. US for United
            States).
          type: string
        state:
          description: State Name.
          type: string
        state_code:
          description: State Code. Should be in ISO 2 format (ie. FL for Florida).
          type: string
        emi_tenure:
          description: EMI tenure selected by the user.
          type: integer
        par:
          description: Par received from network.
          type: string
      required:
      - channel
      title: Card
      type: object
