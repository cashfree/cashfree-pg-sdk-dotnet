        name: x-idempotency-key
        required: false
        schema:
          format: UUID
          type: string
        style: simple
      - description: Payment mode or type of saved instrument.
        example: card
        explode: true
        in: query
        name: instrument_type
        required: true
        schema:
          enum:
          - card
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                fetch_all_saved_cards_example:
                  $ref: "#/components/examples/fetch_all_saved_cards_example"
              schema:
