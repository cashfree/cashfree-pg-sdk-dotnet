          Communicate this in your tech related queries to Cashfree.
        example: 4dfb9780-46fe-11ee-be56-0242ac120002
        explode: false
        in: header
        name: x-request-id
        required: false
        schema:
          type: string
        style: simple
      - description: |
          An idempotency key is a unique identifier you include with your API call.
          If the request fails or times out, you can safely retry it using the same key to avoid duplicate actions.
        example: 47bf8872-46fe-11ee-be56-0242ac120002
        explode: false
        in: header
        name: x-idempotency-key
        required: false
        schema:
          format: UUID
          type: string
        style: simple
      requestBody:
        $ref: "#/components/requestBodies/CreateCustomerRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerEntity"
          description: OK
          headers:
            x-api-version:
              $ref: "#/components/headers/x-api-version"
            x-ratelimit-limit:
              $ref: "#/components/headers/x-ratelimit-limit"
            x-ratelimit-remaining:
              $ref: "#/components/headers/x-ratelimit-remaining"
            x-ratelimit-retry:
              $ref: "#/components/headers/x-ratelimit-retry"
            x-ratelimit-type:
              $ref: "#/components/headers/x-ratelimit-type"
            x-request-id:
              $ref: "#/components/headers/x-request-id"
            x-idempotency-key:
              $ref: "#/components/headers/x-idempotency-key"
            x-idempotency-replayed:
              $ref: "#/components/headers/x-idempotency-replayed"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestError"
          description: Bad request error.
          headers:
            x-api-version:
              $ref: "#/components/headers/x-api-version"
            x-ratelimit-limit:
