    TerminalDetails:
      description: Use this if you are creating an order for cashfree's softPOS.
      example:
        added_on: 2023-08-04T13:12:58+05:30
        cf_terminal_id: 31051123
        last_updated_on: 2023-09-06T14:07:00+05:30
        terminal_address: Banglore
        terminal_id: terminal-123
        terminal_name: test
        terminal_note: POS vertical
        terminal_phone_no: "6309291183"
        terminal_status: ACTIVE
        terminal_type: SPOS
      properties:
        added_on:
          description: date time at which terminal is added.
          type: string
        cf_terminal_id:
          description: "Cashfree terminal ID, this is a required parameter when you\
            \ do not provide the terminal phone number."
          format: int64
          type: integer
        last_updated_on:
          description: last instant when this terminal was updated.
          type: string
        terminal_address:
          description: location of terminal.
          type: string
        terminal_id:
          description: terminal id for merchant reference.
          maxLength: 100
          minLength: 3
          type: string
        terminal_name:
          description: name of terminal/agent/storefront.
          type: string
        terminal_note:
          description: note given by merchant while creating the terminal.
          type: string
        terminal_phone_no:
          description: "mobile num of the terminal/agent/storefront,This is a required\
            \ parameter when you do not provide the cf_terminal_id."
          type: string
        terminal_status:
          description: status of terminal active/inactive.
          type: string
        terminal_type:
          description: "To identify the type of terminal product in use, in this case\
            \ it is SPOS."
          maxLength: 10
          minLength: 4
          type: string
      required:
      - terminal_type
      title: Terminal
      type: object
    TerminalFilters:
      description: Use this object to filter terminal transactions based on various
        criteria.
      example:
        start_date: 2023-08-04T13:12:58+05:30
        end_date: 2023-08-04T13:12:58+05:30
        cf_terminal_id: 1234
        terminal_vpa: cf.epos@cash
        terminal_phone_no: "9696969696"
        payment_status: SUCCESS
        payment_group: UPI
        sort_by: start_date
        sort_order: ASC
      properties:
        start_date:
          description: "Start date and time for transaction filtering. Use ISO8601\
            \ format  (example: 2021-07-02T10:20:12+05:30 for IST, 2021-07-02T10:20:12Z\
            \ for UTC)."
          type: string
        end_date:
          description: "End date and time for transaction filtering. Use ISO8601 format\
            \  (example: 2021-07-02T10:20:12+05:30 for IST, 2021-07-02T10:20:12Z for\
            \ UTC)."
          type: string
        cf_terminal_id:
          description: Unique Cashfree terminal identifier.
          format: int64
          type: integer
        terminal_vpa:
          description: Virtual payment address (VPA) associated with the terminal.
          type: string
        terminal_phone_no:
          description: Mobile phone number registered with the terminal.
          type: string
        payment_status:
          description: "Payment transaction status. Possible values are SUCCESS, FAILED,\
            \ or PENDING."
          type: string
        payment_group:
          description: "Payment method group (for example, UPI, CARD, NET_BANKING)."
          type: string
        sort_by:
          description: Field to sort results by. Currently supports sorting by start_date.
          type: string
        sort_order:
          description: Sort order for the results. Use ASC for ascending or DESC for
            descending order.
          type: string
      title: TerminalFilters
      type: object
    TerminalPagination:
      description: Use this object to configure pagination for terminal transaction
        results.
      example:
        page_number: 1
        page_size: 50
      properties:
        page_number:
          description: Page number for the requested results. Default value is 1.
