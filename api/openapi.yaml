    incidentStartTimeQueryParam:
      description: "Filter incidents by start time. Format: YYYY-MM-DD HH:MM:SS."
      example: 2024-06-01 14:00:00
      explode: true
      in: query
      name: incident_start_time
      required: false
      schema:
        format: date-time
        type: string
      style: form
    incidentEndTimeQueryParam:
      description: "Filter incidents by end time. Format: YYYY-MM-DD HH:MM:SS."
      example: 2024-06-02 14:00:00
      explode: true
      in: query
      name: incident_end_time
      required: false
      schema:
        format: date-time
        type: string
      style: form
    incidentPaymentMethodQueryParam:
      description: "Filter incidents by payment method. Possible values: UPI, CARD,\
        \ NET_BANKING, WALLET."
      example:
      - UPI
      - CARD
      explode: true
      in: query
      name: payment_method
      required: false
      schema:
        items:
          enum:
          - UPI
          - CARD
          - NET_BANKING
          - WALLET
          type: string
        type: array
      style: form
    orderIDParam:
      description: The ID which uniquely identifies your order.
      example: your-order-id
      explode: false
      in: path
      name: order_id
      required: true
      schema:
        type: string
      style: simple
    vendorIDParam:
      description: The id which uniquely identifies your vendor.
      example: your-vendor-id
      explode: false
      in: path
      name: vendor_id
      required: true
      schema:
        type: string
      style: simple
    amountParam:
      description: Specify the amount for which you want to view the service charges
        and service taxes in the response.
      example: 1000
      explode: false
      in: path
      name: amount
      required: true
      schema:
        format: float64
        type: number
      style: simple
    rateTypeParam:
      description: "Mention the type of rate for which you want to check the charges.\
        \ Possible value: VENDOR_ON_DEMAND."
      example: VENDOR_ON_DEMAND
      explode: true
      in: query
      name: rate_type
      required: true
      schema:
        type: string
      style: form
    docTypeParam:
      description: Mention the document type that has to be downloaded. Only an uploaded
        document can be downloaded.
      explode: false
      in: path
      name: doc_type
      required: true
      schema:
        type: string
      style: simple
    xIdempotencyKeyHeader:
      description: |
        An idempotency key is a unique identifier you include with your API call.
        If the request fails or times out, you can safely retry it using the same key to avoid duplicate actions.
      example: 47bf8872-46fe-11ee-be56-0242ac120002
      explode: false
      in: header
      name: x-idempotency-key
      required: false
      schema:
        format: UUID
        type: string
      style: simple
    xRequestIDHeader:
      description: Request ID for the API call. Can be used to resolve tech issues.
        Communicate this in your tech related queries to Cashfree.
      example: 4dfb9780-46fe-11ee-be56-0242ac120002
      explode: false
      in: header
      name: x-request-id
      required: false
      schema:
        type: string
      style: simple
    planIdParam:
      description: Provide the plan ID for which the details have to be fetched.
      example: plan-id-123
      explode: false
      in: path
      name: plan_id
      required: true
      schema:
        type: string
      style: simple
    subscriptionIdParam:
      description: Provide the SubscriptionId using which the subscription was created.
      example: subscription-id-123
      explode: false
      in: path
      name: subscription_id
      required: true
      schema:
        type: string
      style: simple
    subscriptionPaymentIdParam:
      description: Provide the PaymentId using which the payment was created.
      example: payment-id-123
      explode: false
      in: path
      name: payment_id
      required: true
      schema:
        type: string
      style: simple
    subscriptionRefundIdParam:
      description: Provide the PaymentId for which the details have to be fetched.
      example: refund-id-123
      explode: false
      in: path
      name: refund_id
      required: true
      schema:
        type: string
      style: simple
    xClientBrowserHeader:
      description: The browser used to initiate the payment.
      example: safari
      explode: false
      in: header
      name: x-client-browser
      required: false
      schema:
        type: string
      style: simple
    xClientDeviceHeader:
      description: The type of device on which the payment is initiated.
      example: mobile
      explode: false
      in: header
      name: x-client-device
      required: false
      schema:
        type: string
      style: simple
    xClientOsHeader:
      description: The operating system of the client device used to make the payment.
      example: android
      explode: false
      in: header
      name: x-client-os
      required: false
      schema:
        type: string
      style: simple
    xClientRenderingTypeHeader:
      description: Indicates how the payment experience is rendered to the user. -
        mweb – Payment rendered in a mobile browser (browser on a mobile device) -
        webview – Payment rendered inside an in-app browser (WebView within a merchant
        app) - native – Payment rendered natively within the merchant’s mobile app
        using SDKs.
      example: mweb
      explode: false
      in: header
      name: x-client-rendering-type
      required: false
      schema:
        type: string
      style: simple
