  headers:
    x-api-version:
      description: This header has the version of the API. The current version is
        `2026-01-01`.
      explode: false
      schema:
        enum:
        - 2026-01-01
        format: YYYY-MM-DD
        type: string
      style: simple
    x-idempotency-key:
      description: "An idempotency key is a unique identifier you include with your\
        \ API call. If the request fails or times out, you can safely retry it using\
        \ the same key to avoid duplicate actions."
      example: some-idem-id
      explode: false
      schema:
        type: string
      style: simple
    x-idempotency-replayed:
      description: |-
        In conjunction with `x-idempotency-key` this means
        - `true` if the response was replayed
        - `false` if the response has not been replayed.
      example: "true"
      explode: false
      schema:
        format: boolean
        type: string
      style: simple
    x-ratelimit-limit:
      description: Ratelimit set for your account for this API per minute.
      example: 200
      explode: false
      schema:
        type: integer
      style: simple
    x-ratelimit-remaining:
      description: Rate limit remaning for your account for this API in the next minute.
        Uses sliding window.
      example: 2
      explode: false
      schema:
        type: integer
      style: simple
    x-ratelimit-retry:
      description: |
        Contains number of seconds to wait if rate limit is breached
        - Is 0 if withing the limit
        - Is between 1 and 59 if breached
      example: 4
      explode: false
      schema:
        type: integer
      style: simple
    x-ratelimit-type:
      description: |
        either ip or app_id
        - `ip` if making a call from the browser. True for api where you don't need `x-client-id` and `x-client-secret`
        - `app_id` for authenticated api calls i.e using `x-client-id` and `x-client-secret`
      example: ip
      explode: false
      schema:
        enum:
        - app_id
        - ip
        type: string
      style: simple
    x-request-id:
      description: Request id for your api call. Is blank or null if no `x-request-id`
        is sent during the request.
      example: some-req-id
      explode: false
      schema:
        type: string
      style: simple
  parameters:
    apiVersionHeader:
      description: API version to be used. Format is in YYYY-MM-DD.
      example: 2026-01-01
      explode: false
      in: header
      name: x-api-version
      required: true
      schema:
        default: 2026-01-01
        description: API version to be used.
        type: string
      style: simple
      x-ignore: true
    cfPaymentIDParam:
      description: The Cashfree payment or transaction ID.
      example: "121224562"
      explode: false
      in: path
      name: cf_payment_id
      required: true
      schema:
        type: string
      style: simple
    customerIDParam:
      description: "The customer ID provided by the merchant during the [Create Order\
        \ API](https://www.cashfree.com/docs/api-reference/payments/latest/orders/create)\
        \ call, used to save cards for the customer."
      example: your-customer-id
      explode: false
      in: path
      name: customer_id
      required: true
      schema:
        type: string
      style: simple
    linkIDParam:
      description: The payment link ID for which you want to view the details.
      example: your-link-id
      explode: false
      in: path
      name: link_id
      required: true
      schema:
        type: string
      style: simple
    statusQueryParam:
      description: "Mention What is status of orders you want to fetch, default is\
        \ PAID. Possible value: ALL, PAID."
      example: ALL
      explode: true
      in: query
      name: status
      required: false
      schema:
        type: string
      style: form
    incidentIdQueryParam:
      description: Valid incident id for fetching incident details.
      example: your-incident-id
      explode: true
      in: query
      name: incident_id
      required: false
      schema:
        type: string
      style: form
    incidentStatusQueryParam:
      description: "Filter incidents by status. Possible values: ACTIVE, UPCOMING,\
        \ RESOLVED."
      example:
      - ACTIVE
      - RESOLVED
      explode: true
      in: query
      name: incident_status
      required: false
      schema:
        items:
          enum:
          - ACTIVE
          - UPCOMING
          - RESOLVED
          type: string
        type: array
      style: form
    incidentImpactQueryParam:
      description: "Filter incidents by impact level. Possible values: HIGH, MEDIUM,\
        \ LOW."
      example:
      - HIGH
      - MEDIUM
      explode: true
      in: query
