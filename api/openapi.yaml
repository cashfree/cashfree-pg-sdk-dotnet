          description: Specifies the reason for settlement failure. The default value
            is used if this is not provided. This is required only if the status is
            FAILED.
          enum:
          - "\"Due to some technical issues, your amount will be settled in the next\
            \ settlement cycle.\""
          - "\"Due to some technical issues, your amount will be settled in the next\
            \ settlement cycle.\""
          - "\"Bank account details you have provided is not active, write to care@cashfree.com\
            \ with the updated account details.\""
          - "\"Due to some technical issues at the bank, your amount will be settled\
            \ in the next settlement cycle.\""
          - "\"Beneficiary name you have provided is incorrect, write to care@cashfree.com\
            \ with the updated details.\""
          - "\"Unable to settle amount to this beneficiary account, write to care@cashfree.com\
            \ with the updated account details.\""
          - "\"Bank account details you have provided are invalid, write to care@cashfree.com\
            \ with the updated account details.\""
          - "\"The IFSC you have provided for the bank account is invalid, write to\
            \ care@cashfree.com with the valid IFSC.\""
