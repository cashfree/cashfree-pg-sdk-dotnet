openapi: 3.0.0
info:
  contact:
    email: developers@cashfree.com
    name: API Support
    url: https://discord.com/invite/QdZkNSxXsB
  description: "Cashfree's Payment Gateway APIs provide developers with a streamlined\
    \ pathway to integrate advanced payment processing capabilities into their applications,\
    \ platforms and websites."
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Cashfree Payment Gateway APIs
  version: 2026-01-01
externalDocs:
  description: This url will have the information of all the APIs.
  url: https://api.cashfree.com/pg
servers:
- description: Sandbox server.
  url: https://sandbox.cashfree.com/pg
- description: Production server.
  url: https://api.cashfree.com/pg
tags:
- description: Collection of APIs to handle orders.
  name: Orders
- description: Collection of APIs to handle payments.
  name: Payments
- description: Collection of APIs to handle refunds.
  name: Refunds
- description: Collection of APIs to handle settlements.
  name: Settlements
- description: Collection of APIs to handle payment links.
  name: Payment Links
- description: Collection of APIs to use Cashfree's token Vault. This helps you save
    cards and tokenize them in a PCI complaint manner. We support creation of network
    tokens which can be used across acquiring banks.
  name: Token Vault
- description: Collection of APIs to manage softPOS' agent and order.
  name: softPOS
- description: Collection of APIs to handle offers.
  name: Offers
- description: "Collection of APIs to check eligibile entities - payment methods,\
    \ offer, affordibility."
  name: Eligibility
- description: Collection of APIs to handle settlements.
  name: Settlement Reconciliation
- description: Collection of APIs to handle reconciliation.
  name: PG Reconciliation
- description: Collection of APIs to handle customers.
  name: Customers
- description: Collection of APIs to handle Easy-Split.
  name: Easy-Split
- description: Collection of APIs to handle simulation.
  name: Simulation
- description: Collection of APIs to handle disputes.
  name: Disputes
- description: Collection of APIs for utility requirement.
  name: Utilities
- description: Collection of APIs for managing downtimes.
  name: Downtimes
paths:
  /customers:
    post:
      deprecated: false
      description: "Use this API to register a customer in Cashfree's system before\
        \ initiating payments, subscriptions, tokenisation, or other customer-linked\
        \ actions. It creates a reusable *customer profile* and returns a unique identifier\
        \ for future transactions."
      operationId: PGCreateCustomer
      parameters:
      - description: API version to be used. Format is in YYYY-MM-DD.
        example: 2026-01-01
        explode: false
        in: header
        name: x-api-version
        required: true
        schema:
          default: 2026-01-01
          description: API version to be used.
          type: string
        style: simple
        x-ignore: true
